<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 34" width="130" height="34">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square gradient bg -->
  <rect x="0" y="1" width="32" height="32" rx="9" fill="url(#bg)"/>

  <!-- Music icon: single clean note -->
  <!-- Note head -->
  <ellipse cx="11.5" cy="24" rx="4.5" ry="3.2" fill="white"/>
  <!-- Stem -->
  <rect x="15.5" y="10" width="2.8" height="14.5" rx="1.4" fill="white"/>
  <!-- Flag / tail -->
  <path d="M18.3 10 Q25 12 23 18" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Wordmark -->
  <!-- "Concert" – white, bold -->
  <text
    x="40" y="23.5"
    font-family="'Syne','Inter',system-ui,sans-serif"
    font-weight="800"
    font-size="17"
    letter-spacing="-0.6"
    fill="#ffffff">Concert</text>

  <!-- "ID" – gradient, bold, same size -->
  <text
    x="110" y="23.5"
    font-family="'Syne','Inter',system-ui,sans-serif"
    font-weight="800"
    font-size="17"
    letter-spacing="-0.6"
    fill="url(#txt)">ID</text>
</svg>
