<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Icon: music note in rounded square -->
  <rect x="0" y="4" width="32" height="32" rx="8" ry="8" fill="url(#grad)"/>

  <!-- Double music note (beamed) -->
  <!-- Note head left -->
  <ellipse cx="9" cy="27" rx="4" ry="3" fill="white"/>
  <!-- Stem left -->
  <rect x="12.5" y="13" width="2.5" height="14" rx="1.2" fill="white"/>
  <!-- Note head right -->
  <ellipse cx="21" cy="24" rx="4" ry="3" fill="white"/>
  <!-- Stem right -->
  <rect x="24.5" y="10" width="2.5" height="14" rx="1.2" fill="white"/>
  <!-- Beam -->
  <rect x="12.5" y="13" width="14.5" height="3" rx="1.5" fill="white"/>

  <!-- Wordmark: ConcertTour.id -->
  <!-- "Concert" in regular weight -->
  <text x="40" y="27" font-family="'Syne', 'Inter', Arial, sans-serif" font-weight="700" font-size="17" fill="#f4f4f5" letter-spacing="-0.5">Concert</text>
  <!-- "Tour" in purple/gradient — simulate with fill -->
  <text x="113" y="27" font-family="'Syne', 'Inter', Arial, sans-serif" font-weight="800" font-size="17" fill="url(#grad)" letter-spacing="-0.5">Tour</text>
  <!-- ".id" small -->
  <text x="147" y="27" font-family="'Inter', Arial, sans-serif" font-weight="500" font-size="13" fill="#a855f7" letter-spacing="0">.id</text>
</svg>
