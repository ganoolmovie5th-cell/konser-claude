name: 🎵 Daily Concert Monitor

# ── Triggers ─────────────────────────────────────────────────────────────────
on:
  # Tiap hari jam 01:00 WIB = 18:00 UTC (hari sebelumnya)
  schedule:
    - cron: "0 18 * * *"

  # Bisa dijalankan manual dari tab Actions
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scrape tapi tidak kirim email)"
        required: false
        default: "false"

# ── Permissions ───────────────────────────────────────────────────────────────
# READ-ONLY — scraper tidak menulis ke repo sama sekali
permissions:
  contents: read

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  monitor-and-report:
    name: Scrape & Email Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout repo (read-only)
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Setup Python
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run monitoring scraper
      #    → Hanya generate scraper_report.json + scraper_report.html
      #    → TIDAK menulis ke app.js
      #    → TIDAK push ke main
      - name: 🕷️ Run monitoring scraper
        run: python scraper.py

      # 5. Kirim laporan via email
      #    → Skip jika dry_run = true
      - name: 📧 Send email report
        if: github.event.inputs.dry_run != 'true'
        run: python email_reporter.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

      # 6. Upload report sebagai artifact (bisa didownload dari Actions)
      - name: 📎 Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraper-report-${{ github.run_number }}
          path: |
            scraper_report.json
            scraper_report.html
          retention-days: 30

      # 7. Summary
      - name: 📊 Job Summary
        run: |
          echo "## 🎵 ConcertID Monitor Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Scraper selesai** — laporan dikirim ke admin email" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕐 **Waktu run:** $(TZ='Asia/Jakarta' date '+%d %b %Y %H:%M WIB')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **app.js TIDAK diubah** — review laporan dulu sebelum update manual" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 **Artifact:** scraper-report-${{ github.run_number }} (tersedia 30 hari)" >> $GITHUB_STEP_SUMMARY
